<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap - WordFlow</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .chips-container {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .chip {
            background: var(--card-bg);
            color: var(--text-dark);
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            position: absolute;
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: center;
            gap: 8px;
            transform: rotate(-10deg);
        }
        .chip span {
            background: var(--neutral-light);
            color: var(--neutral);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
        }
        .chip.orange {
            background: var(--secondary);
            color: white;
            transform: rotate(15deg);
        }
        .chip.orange span {
            background: rgba(255,255,255,0.2);
            color: white;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <!-- Left Side: Illustration -->
        <div class="auth-left" style="padding: 0; position: relative; overflow: hidden;">
            <img src="img/login_bg.png" alt="Language Learning" style="width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0;">
            <div style="position: absolute; top:0; left:0; width: 100%; height: 100%; background: linear-gradient(135deg, rgba(108, 99, 255, 0.3) 0%, rgba(0, 0, 0, 0.1) 100%);"></div>
        </div>

        <!-- Right Side: Login Form -->
        <div class="auth-right">
            <div class="auth-card">
                <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 24px; color: var(--primary);">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
                    </svg>
                    <h2 style="margin:0; font-size: 24px;">WordFlow</h2>
                </div>

                <h2>Hoş Geldin!</h2>
                <p>Hesabına giriş yap ve öğrenmeye devam et.</p>

                <div id="login-alert" class="alert"></div>

                <form id="loginForm">
                    <div class="form-group">
                        <label>E-posta</label>
                        <div style="position: relative;">
                            <input type="email" id="email" class="form-control" placeholder="ornek@eposta.com" required style="padding-left: 40px;">
                            <svg width="18" height="18" style="position: absolute; left: 14px; top: 15px; color: var(--neutral);" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Şifre</label>
                        <div style="position: relative;">
                            <input type="password" id="password" class="form-control" placeholder="••••••••" required style="padding-left: 40px;">
                            <svg width="18" height="18" style="position: absolute; left: 14px; top: 15px; color: var(--neutral);" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                            <svg width="18" height="18" style="position: absolute; right: 14px; top: 15px; color: var(--neutral); cursor: pointer;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        </div>
                        <div style="text-align: right; margin-top: 8px;">
                            <a href="#" style="font-size: 13px; font-weight: 500;">Şifremi Unuttum</a>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary" style="margin-top: 10px;">
                        Giriş Yap <span style="margin-left: 8px;">&rarr;</span>
                    </button>
                </form>

                <div style="text-align: center; margin-top: 24px; font-size: 14px;">
                    Hesabın yok mu? <a href="register.html" style="font-weight: 600;">Kayıt Ol</a>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                // Backend'in AuthController'ındaki /api/Auth/login endpointine istek atılıyor
                const data = await App.apiCall('/Auth/login', 'POST', { email, password });
                
                if(data.token) {
                    App.setToken(data.token);
                    window.location.href = 'dashboard.html';
                }
            } catch (error) {
                App.showError('login-alert', error.message || 'Giriş başarısız. Lütfen bilgilerinizi kontrol edin.');
            }
        });
    </script>
</body>
</html>
