<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Sonucu - WordFlow</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <style>
        .quiz-result-card {
            background: var(--card-bg);
            border-radius: var(--radius-xl);
            padding: 48px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
            text-align: center;
            max-width: 540px;
            margin: 64px auto;
        }
        .trophy-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--secondary-light);
            color: var(--secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px auto;
        }
        .result-stats-container {
            display: flex;
            gap: 16px;
            margin: 32px 0;
        }
        .result-stat-box {
            flex: 1;
            background: var(--bg-main);
            border-radius: var(--radius-md);
            padding: 24px 16px;
        }
        .result-stat-val {
            font-size: 24px;
            font-weight: 700;
            font-family: var(--font-heading);
            color: var(--text-dark);
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .result-stat-label {
            font-size: 12px;
            color: var(--neutral);
            font-weight: 600;
        }
        .progress-bar-bg {
            width: 100%;
            height: 12px;
            background: var(--neutral-light);
            border-radius: 6px;
            margin-top: 8px;
        }
        .progress-bar-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
                </div>
                <div>
                    <div class="logo-text">WordFlow</div>
                </div>
            </div>

            <ul class="nav-menu">
                <li><a href="dashboard.html" class="nav-link">Ana Sayfa</a></li>
                <li><a href="words.html" class="nav-link">Kelimeler</a></li>
                <li><a href="quiz-start.html" class="nav-link active">Quiz</a></li>
                <li><a href="profile.html" class="nav-link">Profil</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <h1 class="page-title" style="text-align: center; width: 100%;">Quiz Sonucu</h1>
            </header>

            <div class="quiz-result-card" style="padding-top: 0; overflow: hidden; max-width: 500px; margin: 0 auto; width: 100%;">
                <div style="width: 100%; height: 200px; margin-bottom: 32px; position: relative;">
                    <img id="resultMascot" src="img/quiz_bg.png" alt="Quiz Result" style="width: 100%; height: 100%; object-fit: cover;">
                </div>
                
                <h2 style="font-size: 36px; margin-bottom: 8px; padding: 0 40px;" id="resultTitle">0/10 Doğru!</h2>
                <p style="color: var(--neutral); font-size: 15px; margin-bottom: 24px; padding: 0 40px;" id="resultMessage">Tebrikler! Günlük kelime hedefine çok yaklaştın.</p>
                
                <div style="text-align: left; padding: 0 40px;">
                    <div style="display: flex; justify-content: space-between; font-size: 12px; font-weight: 600; color: var(--text-dark);">
                        <span>Başarı Oranı</span>
                        <span id="resultPercent">%0</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" id="resultBar" style="width: 0%;"></div>
                    </div>
                </div>

                <div class="result-stats-container" style="margin: 0 40px 32px 40px;">
                    <div class="result-stat-box">
                        <div class="result-stat-val" style="color: var(--tertiary);">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
                            +<span id="scoreVal">0</span> XP
                        </div>
                        <div class="result-stat-label">Kazanılan Puan</div>
                    </div>
                    <div class="result-stat-box">
                        <div class="result-stat-val" style="color: var(--secondary);">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"></path></svg>
                            <span id="streakVal">1</span> Gün
                        </div>
                        <div class="result-stat-label">Çalışma Serisi</div>
                    </div>
                </div>

                <div style="display: flex; gap: 16px; padding: 0 40px 40px 40px;">
                    <a href="quiz-start.html" class="btn btn-outline" style="flex: 1; border-radius: 24px;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 8px;"><polyline points="1 4 1 10 7 10"></polyline><polyline points="23 20 23 14 17 14"></polyline><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"></path></svg>
                        Tekrar Oyna
                    </a>
                    <a href="dashboard.html" class="btn btn-primary" style="flex: 1; border-radius: 24px;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 8px;"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
                        Ana Sayfaya Dön
                    </a>
                </div>
            </div>
            
        </main>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!App.getToken()) {
                window.location.href = 'index.html';
                return;
            }

            const score = parseInt(sessionStorage.getItem('quizScore') || '0');
            const total = parseInt(sessionStorage.getItem('quizTotal') || '10');
            
            // 100 puan = 1 doğru varsayımı
            const correctCount = score / 100;
            const percent = Math.round((correctCount / total) * 100);

            document.getElementById('resultTitle').innerText = `${correctCount}/${total} Doğru!`;
            document.getElementById('resultPercent').innerText = `%${percent}`;
            document.getElementById('resultBar').style.width = `${percent}%`;
            document.getElementById('scoreVal').innerText = score;

            // Maskot ve Mesaj Güncellemesi
            const mascotImg = document.getElementById('resultMascot');
            const messageEl = document.getElementById('resultMessage');
            
            if(percent >= 70) {
                mascotImg.src = 'img/lexi_success.png';
                messageEl.innerText = "Harikasın! Lexi seninle gurur duyuyor, kelime dağarcığın uçuşa geçti!";
            } else {
                mascotImg.src = 'img/lexi_fail.png';
                messageEl.innerText = "Pes etmek yok! Lexi sana inanıyor, biraz daha tekrarla başarabilirsin.";
            }
            
            
            // Streak varsayılan olarak 0 yaptık, bunu backend'den çekebiliriz
            document.getElementById('streakVal').innerText = "0"; 
        });
    </script>
</body>
</html>
