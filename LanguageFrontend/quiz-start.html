<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Başlangıç - WordFlow</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <style>
        .quiz-start-card {
            background: var(--card-bg);
            border-radius: var(--radius-xl);
            padding: 48px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
            text-align: center;
            max-width: 480px;
            margin: 64px auto;
        }
        .trophy-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--secondary-light);
            color: var(--secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px auto;
        }
        .info-box {
            background: var(--neutral-light);
            border-radius: var(--radius-md);
            padding: 16px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            color: var(--text-dark);
            margin: 32px 0;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
                </div>
                <div>
                    <div class="logo-text">WordFlow</div>
                    <div class="logo-subtext">Öğrenmeye Devam Et</div>
                </div>
            </div>

            <ul class="nav-menu">
                <li><a href="dashboard.html" class="nav-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                    Ana Sayfa
                </a></li>
                <li><a href="words.html" class="nav-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
                    Kelimeler
                </a></li>
                <li><a href="quiz-start.html" class="nav-link active">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                    Quiz
                </a></li>
                <li><a href="profile.html" class="nav-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    Profil
                </a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <h1 class="page-title" style="text-align: center; width: 100%;">Quiz</h1>
                <div class="topbar-right" style="position: absolute; right: 40px;">
                    <div class="user-greeting" id="userGreeting">Hoş geldin!</div>
                    <div class="user-avatar" id="userAvatar">A</div>
                </div>
            </header>

            <div class="quiz-start-card" style="padding-top: 0; overflow: hidden; max-width: 500px; margin: 0 auto; width: 100%;">
                <div style="width: 100%; height: 200px; margin-bottom: 32px; position: relative;">
                    <img src="img/quiz_bg.png" alt="Quiz Ready" style="width: 100%; height: 100%; object-fit: cover;">
                </div>
                <h2 style="font-size: 32px; margin-bottom: 12px; padding: 0 40px;">Quiz'e Hazır mısın?</h2>
                <p style="color: var(--neutral); font-size: 15px; padding: 0 40px;">Öğrendiğin kelimelerle hafızanı tazele ve kelime dağarcığını test et.</p>
                
                <div class="info-box" style="margin: 24px 40px;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
                    <span><span id="quizWordCount">10</span> Kelime Sorulacak</span>
                </div>

                <a href="quiz.html" class="btn btn-primary" style="border-radius: 24px; padding: 16px 24px; font-size: 16px; margin: 0 40px 40px 40px; width: calc(100% - 80px);">
                    Quiz'e Başla <span style="margin-left: 8px;">&rarr;</span>
                </a>
            </div>
            
        </main>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (!App.getToken()) {
                window.location.href = 'index.html';
                return;
            }
            try {
                const user = await App.apiCall('/User/get-user');
                document.getElementById('userGreeting').innerText = `Hoş geldin, ${user.firstName}!`;
                document.getElementById('userAvatar').innerText = user.firstName.charAt(0).toUpperCase();
                
                // Backend'in start-quiz kısmını çağırıp kaç soru geleceğine bakabiliriz
                // Ama şu an quiz.html'de çağıracağız
            } catch (error) {
                console.error(error);
            }
        });
    </script>
</body>
</html>
