<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hesap Oluştur - WordFlow</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-left-register {
            background: linear-gradient(135deg, #f5f3ff 0%, #e0e7ff 100%);
            color: var(--text-dark);
        }
        .hero-text {
            font-size: 40px;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 16px;
            font-family: var(--font-heading);
            color: var(--text-dark);
        }
        .hero-subtext {
            font-size: 16px;
            color: var(--neutral);
            max-width: 80%;
            margin-bottom: 40px;
        }
        .daily-streak-badge {
            background: var(--card-bg);
            padding: 12px 20px;
            border-radius: var(--radius-md);
            display: inline-flex;
            align-items: center;
            gap: 12px;
            box-shadow: var(--shadow-sm);
        }
        .streak-icon {
            background: var(--secondary);
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .row {
            display: flex;
            gap: 16px;
        }
        .row .form-group {
            flex: 1;
        }
        .level-selector {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        .level-btn {
            flex: 1;
            padding: 10px 0;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            border-radius: 24px;
            text-align: center;
            font-weight: 600;
            cursor: pointer;
            color: var(--neutral);
            transition: all 0.2s;
        }
        .level-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        input[type="radio"] {
            display: none;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <!-- Left Side: Illustration / Text -->
        <div class="auth-left auth-left-register" style="align-items: flex-start; padding-left: 10%; position: relative; overflow: hidden;">
            <img src="img/login_bg.png" alt="Language Learning" style="width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 0;">
            <div style="position: absolute; top:0; left:0; width: 100%; height: 100%; background: linear-gradient(135deg, rgba(108, 99, 255, 0.7) 0%, rgba(0, 0, 0, 0.5) 100%); z-index: 1;"></div>
            
            <div style="display: flex; align-items: center; gap: 8px; margin-bottom: auto; color: white; position: relative; z-index: 2;">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="white" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                    <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
                </svg>
                <h2 style="margin:0; font-size: 20px;">WordFlow</h2>
            </div>
            
            <div style="flex: 1; display: flex; flex-direction: column; justify-content: flex-end; padding-bottom: 20%; position: relative; z-index: 2;">
                <h1 class="hero-text" style="color: white;">Yeni bir dil,<br>yeni bir dünya.</h1>
                <p class="hero-subtext" style="color: rgba(255,255,255,0.8);">Her gün sadece 10 dakika ayırarak kelime dağarcığını genişlet ve hedeflerine ulaş.</p>
                <div class="daily-streak-badge" style="background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-color: rgba(255,255,255,0.2);">
                    <div class="streak-icon" style="color: #FFD700;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"></path></svg>
                    </div>
                    <div>
                        <div style="font-weight: 700; font-size: 14px; color: white;">Günlük Seri</div>
                        <div style="font-size: 12px; color: rgba(255,255,255,0.8);">Katıl ve serini başlat!</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Side: Register Form -->
        <div class="auth-right">
            <div class="auth-card" style="box-shadow: none; padding: 20px 48px;">
                <h2>Hesap Oluştur</h2>
                <p>WordFlow'a katılmak için bilgilerini gir.</p>

                <div id="register-alert" class="alert"></div>

                <form id="registerForm">
                    <div class="row">
                        <div class="form-group">
                            <label>Ad</label>
                            <input type="text" id="firstName" class="form-control" placeholder="Adın" required>
                        </div>
                        <div class="form-group">
                            <label>Soyad</label>
                            <input type="text" id="lastName" class="form-control" placeholder="Soyadın" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Kullanıcı Adı</label>
                        <div style="position: relative;">
                            <input type="text" id="userName" class="form-control" placeholder="Kullanıcı adın" required style="padding-left: 40px;">
                            <span style="position: absolute; left: 16px; top: 14px; color: var(--neutral); font-weight: 600;">@</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>E-posta</label>
                        <div style="position: relative;">
                            <input type="email" id="email" class="form-control" placeholder="ornek@email.com" required style="padding-left: 40px;">
                            <svg width="18" height="18" style="position: absolute; left: 14px; top: 15px; color: var(--neutral);" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Şifre</label>
                        <div style="position: relative;">
                            <input type="password" id="password" class="form-control" placeholder="••••••••" required style="padding-left: 40px;">
                            <svg width="18" height="18" style="position: absolute; left: 14px; top: 15px; color: var(--neutral);" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                            <svg width="18" height="18" style="position: absolute; right: 14px; top: 15px; color: var(--neutral); cursor: pointer;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>İngilizce Seviyeniz</label>
                        <div class="level-selector" id="levelSelector">
                            <label class="level-btn"><input type="radio" name="level" value="A1"> A1</label>
                            <label class="level-btn"><input type="radio" name="level" value="A2"> A2</label>
                            <label class="level-btn"><input type="radio" name="level" value="B1"> B1</label>
                            <label class="level-btn active"><input type="radio" name="level" value="B2" checked> B2</label>
                            <label class="level-btn"><input type="radio" name="level" value="C1"> C1</label>
                            <label class="level-btn"><input type="radio" name="level" value="C2"> C2</label>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary" style="margin-top: 16px;">
                        Kayıt Ol <span style="margin-left: 8px;">&rarr;</span>
                    </button>
                </form>

                <div style="text-align: center; margin-top: 24px; font-size: 14px;">
                    Zaten hesabın var mı? <a href="index.html" style="font-weight: 600;">Giriş Yap</a>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        // Radio button logic for levels
        const levelBtns = document.querySelectorAll('.level-btn');
        levelBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                levelBtns.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
            });
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const userName = document.getElementById('userName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const levelString = document.querySelector('input[name="level"]:checked').value;
            
            // Backend'deki EnglishLevel enum'u ile eşleştirme (A1=0, A2=1, B1=2, B2=3, C1=4, C2=5)
            const levelMap = { "A1": 0, "A2": 1, "B1": 2, "B2": 3, "C1": 4, "C2": 5 };
            const level = levelMap[levelString];

            try {
                // Backend /api/Auth/register endpointi
                const data = await App.apiCall('/Auth/register', 'POST', { 
                    firstName, 
                    lastName, 
                    userName, 
                    email, 
                    password, 
                    level 
                });
                
                // Doğrulama sayfasında kullanmak üzere email'i kaydet
                localStorage.setItem('registeredEmail', email);

                App.showSuccess('register-alert', 'Kayıt başarılı! Doğrulama sayfasına yönlendiriliyorsunuz...');
                setTimeout(() => {
                    window.location.href = 'verify.html';
                }, 2000);

            } catch (error) {
                App.showError('register-alert', error.message || 'Kayıt başarısız oldu.');
            }
        });
    </script>
</body>
</html>
