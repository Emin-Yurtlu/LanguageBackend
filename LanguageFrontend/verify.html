<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Posta Doğrulama - WordFlow</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f3ff 0%, #e0e7ff 100%);
        }
        .verify-card {
            background: var(--card-bg);
            border-radius: var(--radius-xl);
            padding: 48px;
            box-shadow: var(--shadow-md);
            text-align: center;
            width: 100%;
            max-width: 480px;
        }
        .mail-icon {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: var(--primary-light);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px auto;
        }
        .code-inputs {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 32px 0;
        }
        .code-input {
            width: 48px;
            height: 56px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            background: var(--neutral-light);
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            font-family: var(--font-heading);
            color: var(--text-dark);
            transition: all 0.2s;
        }
        .code-input:focus {
            outline: none;
            border-color: var(--primary);
            background: var(--card-bg);
            box-shadow: 0 0 0 4px var(--primary-light);
        }
        .timer {
            color: var(--danger);
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 24px;
        }
    </style>
</head>
<body>

    <div class="verify-card">
        <div class="mail-icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
        </div>
        
        <h2 style="font-size: 28px; margin-bottom: 8px;">E-Postanı Doğrula</h2>
        <p style="color: var(--neutral); font-size: 15px;">Adresine 6 haneli kod gönderdik.</p>

        <div id="verifyAlert" class="alert"></div>

        <form id="verifyForm">
            <div class="code-inputs">
                <input type="text" class="code-input" maxlength="1" required>
                <input type="text" class="code-input" maxlength="1" required>
                <input type="text" class="code-input" maxlength="1" required>
                <input type="text" class="code-input" maxlength="1" required>
                <input type="text" class="code-input" maxlength="1" required>
                <input type="text" class="code-input" maxlength="1" required>
            </div>

            <div class="timer">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                Kodun süresi: <span id="timeDisplay">15:00</span>
            </div>

            <button type="submit" class="btn btn-primary">Doğrula</button>
        </form>

        <div style="margin-top: 24px; font-size: 14px; color: var(--neutral);">
            Kodu almadın mı? <a href="#" style="font-weight: 600; color: var(--secondary);">Kodu Tekrar Gönder</a>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        // Auto focus next input
        const inputs = document.querySelectorAll('.code-input');
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && e.target.value.length === 0 && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

        // 15 Dakikalık Geri Sayım Sayacı
        let timeLeft = 15 * 60; // 15 dakika (saniye)
        const timeDisplay = document.getElementById('timeDisplay');
        const submitBtn = document.querySelector('button[type="submit"]');
        
        const timerInterval = setInterval(() => {
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                timeDisplay.innerText = "00:00";
                inputs.forEach(inp => inp.disabled = true);
                submitBtn.disabled = true;
                App.showError('verifyAlert', 'Kodun süresi doldu. Lütfen yeni bir kod isteyin.');
                return;
            }
            
            timeLeft--;
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            timeDisplay.innerText = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }, 1000);

        // Kodu Tekrar Gönder Linki İşlevi
        const resendLink = document.querySelector('a[href="#"]');
        if (resendLink) {
            resendLink.addEventListener('click', async (e) => {
                e.preventDefault();
                // Burada backend'e yeni kod gönderme isteği atılabilir (App.apiCall('/Auth/resend-code'...))
                
                // Sayacı ve formu sıfırla
                timeLeft = 15 * 60;
                timeDisplay.innerText = "15:00";
                inputs.forEach(inp => {
                    inp.disabled = false;
                    inp.value = '';
                });
                submitBtn.disabled = false;
                
                App.showSuccess('verifyAlert', 'Yeni kod başarıyla gönderildi.');
                inputs[0].focus();
            });
        }

        // Backend entegrasyonu (VerifyEmailCommand)
        document.getElementById('verifyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            let code = '';
            inputs.forEach(inp => code += inp.value);

            try {
                // Email'i localStorage veya URL parametresinden alabiliriz.
                // Şu an için örnek olması amacıyla kod kontrol ediliyor.
                const email = localStorage.getItem('registeredEmail');
                
                if (!email) {
                    throw new Error("E-posta adresi bulunamadı. Lütfen kayıt ekranına dönün.");
                }

                await App.apiCall('/Auth/verify-email', 'POST', { email: email, verificationCode: code });
                
                App.showSuccess('verifyAlert', 'E-posta başarıyla doğrulandı!');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);

            } catch (error) {
                App.showError('verifyAlert', error.message || 'Geçersiz veya süresi dolmuş kod.');
            }
        });
    </script>
</body>
</html>
