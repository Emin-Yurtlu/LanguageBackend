<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelimeler - WordFlow</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <style>
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 32px;
        }
        .search-bar {
            background: var(--neutral-light);
            border-radius: 24px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            width: 300px;
        }
        .search-bar input {
            border: none;
            background: transparent;
            outline: none;
            width: 100%;
            font-family: var(--font-body);
        }
        .tabs {
            display: flex;
            gap: 24px;
            border-bottom: 2px solid var(--border-color);
            margin-bottom: 32px;
        }
        .tab {
            padding: 12px 0;
            font-weight: 600;
            color: var(--neutral);
            cursor: pointer;
            position: relative;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s;
        }
        .tab:hover {
            color: var(--text-dark);
        }
        .tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }
        .words-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }
        .word-card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }
        .word-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .word-card-title {
            font-size: 24px;
            font-family: var(--font-heading);
            margin-bottom: 4px;
        }
        .word-card-meaning {
            color: var(--secondary);
            font-weight: 600;
            margin-bottom: 12px;
        }
        .word-card-example {
            color: var(--neutral);
            font-size: 13px;
            margin-bottom: 24px;
            flex: 1;
        }
        .word-card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
            font-size: 12px;
            color: var(--neutral);
        }
        .icon-btn-small {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--primary-light);
            color: var(--primary);
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
                </div>
                <div>
                    <div class="logo-text">WordFlow</div>
                    <div class="logo-subtext">Öğrenmeye Devam Et</div>
                </div>
            </div>

            <ul class="nav-menu">
                <li><a href="dashboard.html" class="nav-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                    Ana Sayfa
                </a></li>
                <li><a href="words.html" class="nav-link active">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
                    Kelimeler
                </a></li>
                <li><a href="quiz-start.html" class="nav-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                    Quiz
                </a></li>
                <li><a href="profile.html" class="nav-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    Profil
                </a></li>
            </ul>

            <div style="margin-top: auto;">
                <button class="nav-link" style="width:100%; border:none; background:transparent; cursor:pointer;" onclick="App.logout()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    Çıkış Yap
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar" style="margin-bottom: 24px;">
                <div class="search-bar">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--neutral)" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" placeholder="Kelime ara...">
                </div>
                <div class="topbar-right">
                    <div class="user-greeting" id="userGreeting">Hoş geldin, Kullanıcı!</div>

                    <div class="user-avatar" id="userAvatar">A</div>
                </div>
            </header>

            <!-- Words Banner Image -->
            <div style="width: 100%; height: 160px; border-radius: var(--radius-xl); overflow: hidden; margin-bottom: 24px; position: relative; box-shadow: var(--shadow-sm);">
                <img src="img/words_bg.png" alt="Library Banner" style="width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 0;">
                <div style="position: absolute; top:0; left:0; width: 100%; height: 100%; background: linear-gradient(to right, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.1) 100%); z-index: 1;"></div>
                <div style="position: relative; z-index: 2; display: flex; flex-direction: column; justify-content: center; height: 100%; padding: 0 40px;">
                    <h2 style="color: white; font-size: 26px; margin-bottom: 8px; font-family: var(--font-heading); font-weight: 800; letter-spacing: -0.5px;">Kelime Kütüphanen</h2>
                    <p style="color: rgba(255,255,255,0.85); font-size: 15px; font-weight: 500;">Öğrendiğin ve keşfettiğin tüm kelimeler burada.</p>
                </div>
            </div>

            <div class="page-header">
                <div>
                    <h1 class="page-title" style="margin-bottom: 8px;">Kelimeler</h1>
                    <p style="color: var(--neutral);">Kelime dağarcığını yönet ve ilerlemeni takip et.</p>
                </div>
            </div>

            <div class="tabs" id="wordTabs">
                <div class="tab active" data-filter="all">Tüm Kelimeler</div>
                <div class="tab" data-filter="learned">Öğrenildiler</div>
                <div class="tab" data-filter="unlearned">Öğrenilmediler</div>
            </div>

            <div class="words-grid" id="wordsContainer">
                <!-- Skeleton Loaders -->
                <div class="word-card skeleton-box skeleton" style="height: 180px;"></div>
                <div class="word-card skeleton-box skeleton" style="height: 180px;"></div>
                <div class="word-card skeleton-box skeleton" style="height: 180px;"></div>
                <div class="word-card skeleton-box skeleton" style="height: 180px;"></div>
                <div class="word-card skeleton-box skeleton" style="height: 180px;"></div>
                <div class="word-card skeleton-box skeleton" style="height: 180px;"></div>
            </div>
            
        </main>
    </div>

    <script src="js/app.js"></script>
    <script>
        let allWords = [];
        let learnedWords = [];
        let unlearnedWords = [];

        document.addEventListener('DOMContentLoaded', async () => {
            if (!App.getToken()) {
                window.location.href = 'index.html';
                return;
            }

            try {
                const user = await App.apiCall('/User/get-user');
                document.getElementById('userGreeting').innerText = `Hoş geldin, ${user.firstName}!`;
                document.getElementById('userAvatar').innerText = user.firstName.charAt(0).toUpperCase();

                // Tüm listeleri çekelim
                learnedWords = await App.apiCall('/Word/learned-words');
                unlearnedWords = await App.apiCall('/Word/not-learned-words');
                allWords = await App.apiCall('/Word/all-words');

                // Öğrenilmiş/Öğrenilmemiş bilgisini eşleştir
                allWords = allWords.map(w => {
                    const isLearned = learnedWords.some(lw => lw.id === w.id);
                    return { ...w, isLearned };
                });

                renderWords(allWords);

                // Tab event listeners
                const tabs = document.querySelectorAll('.tab');
                tabs.forEach(tab => {
                    tab.addEventListener('click', () => {
                        tabs.forEach(t => t.classList.remove('active'));
                        tab.classList.add('active');
                        
                        const filter = tab.getAttribute('data-filter');
                        if (filter === 'all') renderWords(allWords);
                        if (filter === 'learned') renderWords(allWords.filter(w => w.isLearned));
                        if (filter === 'unlearned') renderWords(allWords.filter(w => !w.isLearned));
                    });
                });

            } catch (error) {
                console.error(error);
                document.getElementById('wordsContainer').innerHTML = `<div style="grid-column: 1/-1; color: var(--danger); text-align: center;">Kelimeler yüklenirken hata oluştu.</div>`;
            }
        });

        function renderWords(wordsToRender) {
            const container = document.getElementById('wordsContainer');
            container.innerHTML = '';

            if(wordsToRender.length === 0) {
                container.innerHTML = `
                <div style="grid-column: 1/-1; text-align: center; padding: 60px 20px;">
                    <img src="img/lexi_search.png" alt="Searching" style="width: 140px; height: 140px; object-fit: cover; border-radius: 50%; box-shadow: var(--shadow-md); margin-bottom: 24px; border: 4px solid var(--card-bg);">
                    <h3 style="margin-bottom: 8px; color: var(--text-dark);">Lexi burada bir şey bulamadı!</h3>
                    <p style="color: var(--neutral);">Farklı bir sekmeye bak veya yeni kelimeler öğrenmeye başla.</p>
                </div>`;
                return;
            }

            wordsToRender.forEach(w => {
                const learnedBadge = w.isLearned ? 
                    `<div style="display:flex; align-items:center; gap:4px; color:var(--success); background:var(--success-light); padding:4px 8px; border-radius:12px; font-size:11px; font-weight:700;">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg> Öğrenildi
                     </div>` :
                    `<div style="display:flex; align-items:center; gap:4px; color:var(--secondary); background:var(--secondary-light); padding:4px 8px; border-radius:12px; font-size:11px; font-weight:700;">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg> Henüz Öğrenilmedi
                     </div>`;
                     
                const tagClass = w.isLearned ? 'tag-blue' : 'tag-orange';

                const cardHTML = `
                    <div class="word-card">
                        <div class="word-card-header">
                            <span class="tag-badge ${tagClass}" style="opacity:0.8">${w.level || ''}</span>
                            ${learnedBadge}
                        </div>
                        <div class="word-card-title" style="display:flex; align-items:center; gap:8px;">
                            ${w.englishWord || w.wordText || ''}
                            <button class="speak-btn" style="padding:4px;" onclick="App.speakWord('${(w.englishWord || w.wordText || '').replace(/'/g, "\\'")}', event)" title="Dinle">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                            </button>
                        </div>
                        <div class="word-card-meaning">${w.turkishMeaning || w.meaning || ''}</div>
                        <div class="word-card-example">${w.exampleSentence || 'Örnek cümle yok.'}</div>
                        
                        <div class="word-card-footer">
                            <div style="display:flex; align-items:center; gap:6px;">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                                Son görülme: Yakın zamanda
                            </div>

                        </div>
                    </div>
                `;
                container.innerHTML += cardHTML;
            });
        }
    </script>
</body>
</html>
